<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fullscreen GIF</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      img {
        width: 100vw;
        height: 100dvh;
        object-fit: contain;
        display: block;
      }

      @media (max-width: 768px) {
        img {
          transform: rotate(180deg);
          transform-origin: center;
        }
      }
    </style>
  </head>
  <body>
    <img src="Scene1.gif" alt="fullscreen gif" />
  </body>
</html>
